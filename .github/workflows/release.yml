name: Build immutable image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: find-my-customer-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: build
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          build-args: FMC_RELEASE_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Publish immutable identity
        run: |
          test -n "${{ steps.build.outputs.digest }}"
          printf 'commit=%s\ndigest=%s\n' "${{ github.sha }}" "${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
