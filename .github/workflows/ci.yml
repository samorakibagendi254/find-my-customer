name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  skill:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Validate skill structure
        shell: bash
        run: |
          python -c "from pathlib import Path; text=Path('find-first-customers/SKILL.md').read_text(encoding='utf-8'); assert text.startswith('---\\nname: find-first-customers\\n'); assert 'description:' in text"
      - name: Run tests
        run: python -m unittest tests/test_generate_report.py tests/test_installer.py tests/test_report_model.py -v
      - name: Check package contents
        run: npm pack --dry-run

  portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install portal
        run: python -m pip install -e '.[dev]'
      - name: Run portal and contract tests
        run: python -m pytest
      - name: Audit Python dependencies
        run: python -m pip_audit
      - name: Validate production Compose
        run: |
          cp deploy/env.example deploy/.env
          docker compose --env-file deploy/env.example -f deploy/compose.yml config --quiet
