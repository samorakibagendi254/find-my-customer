<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0b0d0c">
  {% if csrf %}<meta name="csrf-token" content="{{ csrf }}">{% endif %}
  <title>{% block title %}Find My Customer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/portal.css') }}?v={{ asset_version }}">
  <script src="{{ url_for('static', path='/portal.js') }}?v={{ asset_version }}" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header{% if not identity %} public-header{% endif %}">
    <a class="wordmark" href="/" aria-label="Find My Customer home">
      <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
      <span>Find My Customer</span>
    </a>
    {% if identity %}
    <div class="header-actions">
      <div class="identity"><span class="live-dot" aria-hidden="true"></span><span>{{ identity.email }}</span></div>
      <form method="post" action="/logout" class="logout-form">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <button type="submit">Sign out</button>
      </form>
    </div>
    {% endif %}
  </header>
  <main id="main">{% block content %}{% endblock %}</main>
  <footer class="site-footer">
    <span>Public signals. Human outreach.</span>
    <nav aria-label="Legal"><a href="/terms">Terms</a><a href="/privacy">Privacy</a><a href="/deletion">Data deletion</a></nav>
  </footer>
</body>
</html>
