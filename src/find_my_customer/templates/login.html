{% extends "base.html" %}
{% block title %}Sign in — Find My Customer{% endblock %}
{% block content %}
<section class="login-shell">
  <div class="login-card">
    <p class="eyebrow"><span></span> Private research console</p>
    <h1>Welcome back.</h1>
    <p class="login-lede">Sign in to launch and monitor your customer discovery runs.</p>
    <form method="post" action="/login" class="login-form">
      <input type="hidden" name="csrf" value="{{ csrf }}">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" autocomplete="username" required maxlength="320" autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required minlength="12">
      <button class="launch-button" type="submit"><span>Sign in</span><b aria-hidden="true">→</b></button>
    </form>
    <p class="privacy-note">Your session expires after 8 hours. Research stays private to your account.</p>
  </div>
</section>
{% endblock %}
